<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus & Do</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #090b10;
            --card-bg: rgba(19, 24, 34, 0.72);
            --card-bg-strong: rgba(15, 20, 29, 0.92);
            --accent-color: #57ff9f;
            --accent-sub: #6fd3ff;
            --text-main: #f5f7ff;
            --text-dim: #96a0ba;
            --border-style: 1px solid rgba(111, 211, 255, 0.25);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(87, 255, 159, 0.08), transparent 35%),
                radial-gradient(circle at 80% 5%, rgba(111, 211, 255, 0.08), transparent 30%),
                linear-gradient(145deg, #03050a, #060b15 45%, #050916);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(#2a2a2a 1px, transparent 0);
            background-size: 24px 24px;
            opacity: 0.2;
            z-index: 1;
            pointer-events: none;
        }
        .video-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .video-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(3, 6, 12, 0.58);
        }
        .video-bg iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 177.78vh;
            height: 100vh;
            min-width: 100vw;
            min-height: 56.25vw;
            transform: translate(-50%, -50%) scale(1.08);
            border: 0;
            filter: saturate(0.78) brightness(0.42) contrast(1.05);
        }
        .lang-switch {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 14, 22, 0.75);
            backdrop-filter: blur(8px);
            border: var(--border-style);
            color: #dce7ff;
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'Silkscreen', sans-serif;
            font-size: 0.9rem;
            z-index: 100;
        }
        .lang-switch:hover {
            color: var(--accent-color);
            border-color: rgba(87, 255, 159, 0.55);
        }
        .pomo-stats {
            position: fixed;
            top: 20px;
            right: 20px;
            font-family: 'Silkscreen', sans-serif;
            color: var(--accent-color);
            font-size: 1rem;
            z-index: 100;
            text-shadow: 0 0 18px rgba(87, 255, 159, 0.35);
        }
        .focus-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        .pixel-title {
            font-family: 'Silkscreen', sans-serif;
            font-size: 1.8rem;
            color: var(--accent-color);
            margin-bottom: 25px;
            letter-spacing: 4px;
            text-shadow: 0 0 24px rgba(87, 255, 159, 0.45);
        }
        .timer-box {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: var(--border-style);
            padding: 50px 60px;
            text-align: center;
            position: relative;
            min-width: 650px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 20px;
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.46), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        }
        .timer-display {
            font-family: 'Silkscreen', sans-serif;
            font-size: 9.5rem;
            margin: 10px 0 20px 0;
            color: var(--text-main);
            text-shadow: 0 0 20px rgba(87, 255, 159, 0.32); 
            width: 500px;
            text-align: center;
            letter-spacing: 2px;
        }
        .current-mission {
            font-family: 'Silkscreen', sans-serif;
            font-size: 1.6rem;
            color: var(--text-dim);
            margin-bottom: 30px;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            border: var(--border-style);
            border-radius: 14px;
        }
        .current-mission span { color: var(--text-main); }
        .time-settings {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .setting-item {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 6px;
            min-width: 118px;
        }
        .setting-item label {
            font-size: 0.74rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            font-family: 'Silkscreen', sans-serif;
        }
        .setting-item input {
            background: rgba(5, 10, 18, 0.84);
            color: var(--text-main);
            border: var(--border-style);
            border-radius: 10px;
            padding: 10px 12px;
            width: 118px;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }
        .setting-item input:focus {
            border-color: rgba(87, 255, 159, 0.55);
            box-shadow: 0 0 0 3px rgba(87, 255, 159, 0.16);
        }
        .apply-btn {
            height: 40px;
            background: linear-gradient(135deg, rgba(87, 255, 159, 0.18), rgba(111, 211, 255, 0.18));
            border: var(--border-style);
            color: var(--text-main);
            border-radius: 10px;
            padding: 0 16px;
            font-family: 'Silkscreen', sans-serif;
            cursor: pointer;
        }
        .apply-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(87, 255, 159, 0.7);
            color: var(--accent-color);
        }
        .controls button {
            background: rgba(5, 10, 18, 0.72);
            border: var(--border-style);
            color: var(--text-main);
            padding: 12px 20px;
            margin: 0 5px;
            font-family: 'Silkscreen', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .controls button:hover {
            background: rgba(87, 255, 159, 0.18);
            color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(87, 255, 159, 0.2);
            border-color: rgba(87, 255, 159, 0.65);
        }
        .hotkey-hint {
            margin-top: 30px;
            font-family: 'Silkscreen', sans-serif;
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 1px;
        }
        .sidebar {
            position: fixed;
            right: -420px;
            top: 0;
            width: 420px;
            height: 100%;
            background: var(--card-bg-strong);
            backdrop-filter: blur(16px);
            border-left: var(--border-style);
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 50;
            display: flex;
            flex-direction: column;
        }
        .sidebar.active { right: 0; }
        .sidebar-toggle {
            position: absolute;
            left: -48px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--card-bg-strong);
            border: var(--border-style);
            border-right: none;
            color: var(--accent-color);
            padding: 25px 12px;
            cursor: pointer;
            writing-mode: vertical-lr;
            font-family: 'Silkscreen', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
        .todo-content { padding: 40px; height: 100%; display: flex; flex-direction: column; }
        .todo-header {
            font-family: 'Silkscreen', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 15px;
        }
        .todo-input-group { display: flex; margin-bottom: 30px; }
        .todo-input-group input {
            flex-grow: 1;
            background: rgba(0,0,0,0.3);
            border: var(--border-style);
            border-right: none;
            padding: 15px;
            color: white;
            outline: none;
        }
        .todo-input-group button {
            background: var(--accent-color);
            border: none;
            color: black;
            padding: 0 20px;
            font-family: 'Silkscreen', sans-serif;
            cursor: pointer;
        }
        .task-list {
            list-style: none;
            padding: 0;
            overflow-y: auto;
            flex-grow: 1;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #333;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.02);
        }
        .task-text { flex-grow: 1; cursor: pointer; font-size: 1.1rem; }
        .task-text.done { text-decoration: line-through; color: var(--text-dim); }
        .del-btn {
            background: transparent;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-family: 'Silkscreen', sans-serif;
        }
        @media (max-width: 768px) {
            .sidebar { width: 100%; right: -100%; }
            .timer-box { min-width: 90%; padding: 30px; }
            .timer-display { font-size: 4.5rem; width: auto; }
            .hotkey-hint { display: none; }
            .time-settings { gap: 8px; }
            .setting-item { min-width: 100px; }
            .setting-item input { width: 100px; }
        }
    </style>
</head>
<body>

    <div class="video-bg" aria-hidden="true">
        <iframe
            src="https://www.youtube.com/embed/lZTKUYnVPpU?autoplay=1&mute=1&loop=1&playlist=lZTKUYnVPpU&controls=0&modestbranding=1&rel=0"
            title="Background video"
            loading="lazy"
            allow="autoplay; fullscreen; encrypted-media"
            referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
    </div>
    <button class="lang-switch" onclick="toggleLang()">EN / 中文</button>
    <div class="pomo-stats" id="pomo-stats">COMPLETED: 00</div>

    <main class="focus-container">
        <div class="pixel-title" id="pomo-title">SYSTEM.FOCUS_MODE</div>
        <div class="timer-box" id="main-box">
            <div class="timer-display" id="timer">25:00</div>
            
            <div class="current-mission" id="current-mission">
                TARGET: <span>STANDBY...</span>
            </div>
            <div class="time-settings">
                <div class="setting-item">
                    <label id="focus-label" for="focus-minutes">FOCUS (MIN)</label>
                    <input type="number" id="focus-minutes" min="1" max="180" step="1">
                </div>
                <div class="setting-item">
                    <label id="break-label" for="break-minutes">BREAK (MIN)</label>
                    <input type="number" id="break-minutes" min="1" max="60" step="1">
                </div>
                <button class="apply-btn" id="btn-apply-time" onclick="applyCustomTime()">APPLY</button>
            </div>

            <div class="controls">
                <button id="btn-start" onclick="startTimer()">START</button>
                <button id="btn-break" onclick="setBreak()">BREAK</button>
                <button id="btn-pause" onclick="pauseTimer()">PAUSE</button>
                <button id="btn-reset" onclick="resetTimer()">RESET</button>
            </div>
        </div>
        <div class="hotkey-hint">[SPACE] START/PAUSE &nbsp;&nbsp; [B] BREAK &nbsp;&nbsp; [R] RESET</div>
    </main>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-toggle" id="toggle-text" onclick="toggleSidebar()">TASKS</div>
        <div class="todo-content">
            <div class="todo-header" id="todo-title">TO-DO LIST</div>
            <div class="todo-input-group">
                <input type="text" id="task-input" placeholder="NEXT MISSION...">
                <button onclick="addTask()">ADD</button>
            </div>
            <ul class="task-list" id="task-list"></ul>
        </div>
    </aside>

    <script>
        let currentLang = 'en';
        const defaultConfig = { focusMinutes: 25, breakMinutes: 5 };
        let timerConfig = loadTimerConfig();
        let timeLeft = timerConfig.focusMinutes * 60;
        let timerId = null;
        let isPlaying = false;
        let currentMode = 'focus';
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let completedPomos = parseInt(localStorage.getItem('pomos')) || 0;

        const i18n = {
            en: {
                title: "SYSTEM.FOCUS_MODE", breakTitle: "SYSTEM.REST_MODE",
                start: "START", break: "BREAK", pause: "PAUSE", reset: "RESET",
                tasks: "TASKS", todoTitle: "TO-DO LIST",
                placeholder: "NEXT MISSION...", add: "ADD",
                focusLabel: "FOCUS (MIN)", breakLabel: "BREAK (MIN)", apply: "APPLY",
                alertPomo: "MISSION ACCOMPLISHED. REST NOW.",
                alertBreak: "BREAK OVER. BACK TO WORK.",
                alertInvalidTime: "Please enter valid minutes.",
                target: "TARGET", standby: "STANDBY...", completed: "COMPLETED"
            },
            zh: {
                title: "系統.專注模式", breakTitle: "系統.休息模式",
                start: "開始", break: "休息", pause: "暫停", reset: "重置",
                tasks: "待辦事項", todoTitle: "任務清單",
                placeholder: "下一項任務...", add: "新增",
                focusLabel: "專注時間(分)", breakLabel: "休息時間(分)", apply: "套用",
                alertPomo: "專注完成。立即休息。",
                alertBreak: "休息結束。準備開始。",
                alertInvalidTime: "請輸入有效的分鐘數。",
                target: "當前目標", standby: "待命中...", completed: "今日完成"
            }
        };

        function sanitizeMinutes(value, min, max, fallback) {
            const num = Number(value);
            if (!Number.isFinite(num)) return fallback;
            return Math.max(min, Math.min(max, Math.round(num)));
        }

        function loadTimerConfig() {
            try {
                const saved = JSON.parse(localStorage.getItem('timerConfig'));
                if (!saved) return { ...defaultConfig };
                return {
                    focusMinutes: sanitizeMinutes(saved.focusMinutes, 1, 180, defaultConfig.focusMinutes),
                    breakMinutes: sanitizeMinutes(saved.breakMinutes, 1, 60, defaultConfig.breakMinutes)
                };
            } catch (error) {
                return { ...defaultConfig };
            }
        }

        function saveTimerConfig() {
            localStorage.setItem('timerConfig', JSON.stringify(timerConfig));
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                if (document.activeElement) document.activeElement.blur();
                isPlaying ? pauseTimer() : startTimer();
            }
            if (e.key.toLowerCase() === 'r') {
                e.preventDefault();
                resetTimer();
            }
            if (e.key.toLowerCase() === 'b') {
                e.preventDefault();
                setBreak();
            }
        });

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            updateUI();
        }

        function updateUI() {
            const d = i18n[currentLang];
            document.getElementById('pomo-title').textContent = currentMode === 'focus' ? d.title : d.breakTitle;
            document.getElementById('btn-start').textContent = d.start;
            document.getElementById('btn-break').textContent = d.break;
            document.getElementById('btn-pause').textContent = d.pause;
            document.getElementById('btn-reset').textContent = d.reset;
            document.getElementById('focus-label').textContent = d.focusLabel;
            document.getElementById('break-label').textContent = d.breakLabel;
            document.getElementById('btn-apply-time').textContent = d.apply;
            document.getElementById('toggle-text').textContent = d.tasks;
            document.getElementById('todo-title').textContent = d.todoTitle;
            document.getElementById('task-input').placeholder = d.placeholder;
            document.querySelector('.todo-input-group button').textContent = d.add;
            updatePomoCount();
            renderTasks();
        }

        function syncDurationInputs() {
            document.getElementById('focus-minutes').value = timerConfig.focusMinutes;
            document.getElementById('break-minutes').value = timerConfig.breakMinutes;
        }

        function updatePomoCount() {
            document.getElementById('pomo-stats').textContent = `${i18n[currentLang].completed}: ${completedPomos.toString().padStart(2, '0')}`;
            localStorage.setItem('pomos', completedPomos);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }

        function startTimer() {
            if (isPlaying) return;
            isPlaying = true;
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    pauseTimer();
                    if (currentMode === 'focus') {
                        completedPomos++;
                        updatePomoCount();
                        alert(i18n[currentLang].alertPomo);
                    } else {
                        alert(i18n[currentLang].alertBreak);
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isPlaying) return;
            clearInterval(timerId);
            timerId = null;
            isPlaying = false;
        }

        function setBreak() {
            pauseTimer();
            currentMode = 'break';
            timeLeft = timerConfig.breakMinutes * 60;
            updateTimerDisplay();
            document.getElementById('pomo-title').textContent = i18n[currentLang].breakTitle;
            document.getElementById('pomo-title').style.color = 'var(--accent-sub)';
        }

        function resetTimer() { 
            pauseTimer(); 
            currentMode = 'focus';
            timeLeft = timerConfig.focusMinutes * 60; 
            updateTimerDisplay(); 
            document.getElementById('pomo-title').textContent = i18n[currentLang].title;
            document.getElementById('pomo-title').style.color = 'var(--accent-color)';
        }

        function applyCustomTime() {
            const focusInput = document.getElementById('focus-minutes');
            const breakInput = document.getElementById('break-minutes');

            const focusValue = Number(focusInput.value);
            const breakValue = Number(breakInput.value);
            if (!Number.isFinite(focusValue) || !Number.isFinite(breakValue) || focusValue <= 0 || breakValue <= 0) {
                alert(i18n[currentLang].alertInvalidTime);
                syncDurationInputs();
                return;
            }

            timerConfig.focusMinutes = sanitizeMinutes(focusValue, 1, 180, defaultConfig.focusMinutes);
            timerConfig.breakMinutes = sanitizeMinutes(breakValue, 1, 60, defaultConfig.breakMinutes);
            saveTimerConfig();
            syncDurationInputs();
            resetTimer();
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
        }

        function addTask() {
            const input = document.getElementById('task-input');
            if (!input.value.trim()) return;
            tasks.push({ text: input.value, done: false });
            input.value = '';
            saveAndRender();
        }

        function toggleTask(index) { 
            tasks[index].done = !tasks[index].done; 
            saveAndRender(); 
        }

        function deleteTask(index) { 
            tasks.splice(index, 1); 
            saveAndRender(); 
        }

        function saveAndRender() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            let activeTaskFound = false;

            tasks.forEach((t, i) => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <span class="task-text ${t.done ? 'done' : ''}" onclick="toggleTask(${i})">
                        ${t.done ? '[X] ' : '[ ] '} ${t.text}
                    </span>
                    <button class="del-btn" onclick="deleteTask(${i})">DEL</button>
                `;
                list.appendChild(li);

                if (!t.done && !activeTaskFound) {
                    document.getElementById('current-mission').innerHTML = `${i18n[currentLang].target}: <span>${t.text}</span>`;
                    activeTaskFound = true;
                }
            });

            if (!activeTaskFound) {
                document.getElementById('current-mission').innerHTML = `${i18n[currentLang].target}: <span>${i18n[currentLang].standby}</span>`;
            }
        }

        document.getElementById('task-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        syncDurationInputs();
        updateUI();
        updateTimerDisplay();
    </script>
</body>
</html>
